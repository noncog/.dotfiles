#hide_window_decorations yes
#macos_hide_from_tasks yes
#allow_remote_control yes

# font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# dracula theme
foreground            #f8f8f2
background            #282a36
selection_foreground  #ffffff
selection_background  #44475a

url_color #8be9fd

# terminal colors
# black
color0  #21222c
color8  #6272a4

# red
color1  #ff5555
color9  #ff6e6e

# green
color2  #50fa7b
color10 #69ff94

# yellow
color3  #f1fa8c
color11 #ffffa5

# blue
color4  #bd93f9
color12 #d6acff

# magenta
color5  #ff79c6
color13 #ff92df

# cyan
color6  #8be9fd
color14 #a4ffff

# white
color7  #f8f8f2
color15 #ffffff

# Cursor colors
cursor            #f8f8f2
cursor_text_color background

background_opacity 0.9

#: Choose the color of text under the cursor. If you want it rendered
#: with the background color of the cell underneath instead, use the
#: special keyword: background

# Tab bar colors
active_tab_foreground   #282a36
active_tab_background   #f8f8f2
inactive_tab_foreground #282a36
inactive_tab_background #6272a4

# Marks
mark1_foreground #282a36
mark1_background #ff5555

# Splits/Windows
active_border_color #f8f8f2
inactive_border_color #6272a4

# remove default keybinds
map ctrl+d no_op
map ctrl+u no_op

map kitty_mod+d no_op
map kitty_mod+u no_op

map ctrl+u scroll_page_up
map ctrl+d scroll_page_down

map ctrl+h no_op
map ctrl+j no_op
map ctrl+k no_op
map ctrl+l no_op

map ctrl+i no_op

map kitty_mod+h no_op
map kitty_mod+j no_op
map kitty_mod+k no_op
map kitty_mod+l no_op

map kitty_mod+i no_op

map kitty_mod+t no_op
map kitty_mod+enter no_op

map kitty_mod+h previous_tab
map kitty_mod+j scroll_line_down
map kitty_mod+k scroll_line_up
map kitty_mod+l next_tab

map kitty_mod+enter new_tab
